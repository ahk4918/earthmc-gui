name: Build and Upload Multi-Platform Installers

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-all:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Keeps other OS runners alive if one fails
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      
      # Force electron-builder to ONLY compile local assets and bypass the broken token check
      - name: Compile App Installers
        run: npm run ${{ matrix.script }} -- --config.publish=never

      # Always saves and displays your installer files in the GitHub Actions summary UI
      - name: Upload local build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-installers-${{ matrix.os }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
