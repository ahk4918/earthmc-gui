name: Build and Upload Multi-Platform Installers

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build-all:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
          - os: windows-latest
            script: dist:win
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      
      - name: Compile App Installers
        run: npm run ${{ matrix.script }}

      # Upload to intermediate storage so the release job can grab them
      - name: Upload local build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-installers-${{ matrix.os }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  publish-release:
    name: Upload All to GitHub Release
    runs-on: ubuntu-latest
    needs: build-all # Ensures this only runs after builds are complete
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-installers-*
          merge-multiple: true
          path: all-installers

      - name: Display files to be uploaded
        run: ls -R all-installers

      - name: Publish Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-installers/*
          token: ${{ secrets.GITHUB_TOKEN }}
