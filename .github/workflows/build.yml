name: Build and Upload Multi-Platform Installers
on:
  release:
    types: [created]

jobs:
  build-win-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run dist:all
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run dist:mac
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*