name: Build and Upload Multi-Platform Installers

on:
  release:
    types: [published, created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci

      # Determine script based on OS
      - run: npm run dist:linux
        if: matrix.os == 'ubuntu-latest'
      - run: npm run dist:win
        if: matrix.os == 'windows-latest'
      - run: npm run dist:mac
        if: matrix.os == 'macos-latest'

      # Upload platform artifacts to be collected later
      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ matrix.os }}
          path: dist/
          if-no-files-found: error

  release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-dist-artifacts
          pattern: dist-artifacts-*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: all-dist-artifacts

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: all-dist-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
