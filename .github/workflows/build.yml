name: Build and Upload Multi-Platform Installers

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-all:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }} # Maps your repo secret down into all platform shells
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      
      # Electron-builder reads the top-level GH_TOKEN during this step to publish directly
      - run: npm run ${{ matrix.script }}
