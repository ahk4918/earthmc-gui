name: Build and Upload Multi-Platform Installers
on:
  release:
    types: [created]

jobs:
  build-win-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm ci
      
      - name: Make scripts executable
        run: chmod +x build-linux.sh build-all.sh
        
      - name: Run Build Script
        run: ./build-linux.sh

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/* # Directly uploads everything your bash script successfully processed

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm ci
        
      - name: Run Mac Build
        run: npm run dist:mac # Uses your standard package.json script directly
        
      - name: Upload Mac Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
