name: Build and Upload Multi-Platform Installers
on:
  release:
    types: [created]

jobs:
  build-win-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm ci
      
      - name: Make scripts executable
        run: chmod +x build-linux.sh build-all.sh
        
      - name: Run Build Script
        run: ./build-linux.sh
        # If your script doesn't forward flags, make sure --publish never 
        # is added directly inside your build-linux.sh electron-builder command.

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.deb
            out/*.rpm
            out/*.exe

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm ci
      
      - name: Make script executable
        run: chmod +x build-mac.zsh
        
      - name: Run Mac Build Script
        run: zsh build-mac.zsh
        
      - name: Upload Mac Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.dmg
            out/*.zip
