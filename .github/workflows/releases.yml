name: Build and Upload Multi-Platform Installers

on:
  release:
    types: [created]

jobs:
  # Job 1: Compiles Linux and Windows via your native shell scripts
  build-win-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Grant execution rights to bash scripts
        run: chmod +x build-linux.sh build-all.sh

      - name: Execute custom Linux compilation script
        run: ./build-linux.sh

      - name: Upload Linux and Compressed Binaries from out folder
        uses: softprops/action-gh-release@v2
        with:
          files: out/* # Direct mapping of every separate file in /out

  # Job 2: Compiles Mac versions using standard electron-builder
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile macOS Apps
        run: npm run dist:mac

      - name: Upload macOS Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip